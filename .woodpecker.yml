steps:
  verify:
    image: node:22-bookworm-slim
    commands:
      - npm ci
      - npm run build
    when:
      event:
        - push
        - pull_request
        - tag
        - deployment

  publish-main:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - verify
    settings:
      registry: rg.furkantrn.com
      repo: movie-archive
      dockerfile: Dockerfile
      context: .
      cache: true
      tags:
        - latest
        - ${CI_COMMIT_SHA}
      username:
        from_secret: rg_username
      password:
        from_secret: rg_password
    when:
      branch:
        - main
        - master
      event:
        - push

  publish-tag:
    image: woodpeckerci/plugin-kaniko
    depends_on:
      - verify
    settings:
      registry: rg.furkantrn.com
      repo: movie-archive
      dockerfile: Dockerfile
      context: .
      cache: true
      auto_tag: true
      username:
        from_secret: rg_username
      password:
        from_secret: rg_password
    when:
      event:
        - tag

  deploy-production:
    image: docker:27-cli
    depends_on:
      - verify
    environment:
      DEPLOY_PATH:
        from_secret: deploy_path
      RG_PASSWORD:
        from_secret: rg_password
      RG_USERNAME:
        from_secret: rg_username
    commands:
      - apk add --no-cache curl
      - '[ "${CI_PIPELINE_DEPLOY_TARGET:-}" = "production" ]'
      - '[ "${CI_PIPELINE_DEPLOY_TASK:-}" = "deploy" ]'
      - cd "$DEPLOY_PATH"
      - echo "$RG_PASSWORD" | docker login rg.furkantrn.com --username "$RG_USERNAME" --password-stdin
      - IMAGE_TAG="$CI_COMMIT_SHA" docker compose pull
      - IMAGE_TAG="$CI_COMMIT_SHA" docker compose up -d
      - docker compose ps
      - |
        attempt=0
        while [ "$attempt" -lt 20 ]; do
          health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' movie-archive 2>/dev/null || echo missing)"
          if [ "$health_status" = "healthy" ]; then
            docker exec movie-archive node -e "fetch('http://127.0.0.1:3001/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
            exit 0
          fi

          attempt=$((attempt + 1))
          sleep 3
        done

        echo "Deploy health gate başarısız oldu"
        docker compose ps
        docker logs --tail=100 movie-archive || true
        exit 1
    when:
      event:
        - deployment
